name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (dotnet)
    runs-on: ubuntu-latest
    # Integration tests use WebApplicationFactory<Program> which boots the real
    # API and runs db.Database.Migrate() against a live Postgres. We provision
    # a service container instead of relying on Testcontainers (the dep is
    # present in BomPriceApproval.Tests.csproj but is not actually wired up).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: bom_price_approval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --nologo

      - name: Audit NuGet packages (vulnerable)
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

      - name: Test
        env:
          # ASP.NET Core conventions: __ replaces : in env-var keys for
          # nested config, so ConnectionStrings__DefaultConnection maps to
          # ConnectionStrings:DefaultConnection. These shadow the empty
          # values shipped in appsettings.json.
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=bom_price_approval;Username=postgres;Password=testpass"
          Jwt__Key: "test-jwt-signing-key-32-chars-minimum-required-for-hmac-sha256"
        run: dotnet test --configuration Release --no-build --nologo --verbosity normal

  frontend:
    name: Frontend (bom-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bom-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bom-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
