name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --nologo

      - name: Audit NuGet packages (vulnerable)
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

      - name: Test (Testcontainers PostgreSQL — requires Docker)
        run: dotnet test --configuration Release --no-build --nologo --verbosity normal

  frontend:
    name: Frontend (bom-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bom-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bom-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
