<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Site supports both light + dark via the in-app toggle (Topbar moon/sun).
         Telling browsers we honor both prevents Chrome's auto-dark from forcing
         its own inversion on top of our themed CSS. -->
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e40af" />
    <!-- mobile-web-app-capable is the spec name; apple- is the legacy alias.
         Chrome warns about deprecated apple- when mobile- is missing. Ship both. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FPF Quotations" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa-64x64.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>FPF Quotations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
