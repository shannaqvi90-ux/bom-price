# fly.toml app configuration file generated for bom-fpf-api on 2026-04-28T00:11:26+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bom-fpf-api'
primary_region = 'sin'

[build]
  dockerfile = 'BomPriceApproval.API/Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:8080'
  CorsAllowedOrigins = 'https://bom-fpf.pages.dev'
  # Pool was 5 — exhausted by SignalR + concurrent users + keepalive, causing
  # login hangs. 20 gives headroom without stressing Neon's connection budget.
  Npgsql__MaxPoolSize = '20'
  # MinPoolSize 2 keeps two connections warm — DbKeepAliveService recycles them.
  Npgsql__MinPoolSize = '2'

[http_service]
  internal_port = 8080
  force_https = true
  # Was auto_stop='stop' + min_machines=0 → Fly was stopping the machine when
  # idle, which caused the next request to time out before the .NET app could
  # warm up. Combined with Neon serverless cold-wake this produced reliably
  # broken sessions every ~30 minutes. Keeping the machine always-on costs
  # roughly the same (every request was waking it anyway) and eliminates the
  # cold-stop hang entirely.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
