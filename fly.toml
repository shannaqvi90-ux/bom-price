# fly.toml app configuration file generated for bom-fpf-api on 2026-04-28T00:11:26+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bom-fpf-api'
primary_region = 'sin'

[build]
  dockerfile = 'BomPriceApproval.API/Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:8080'
  CorsAllowedOrigins = 'https://bom-fpf.pages.dev'
  Npgsql__MaxPoolSize = '5'
  Npgsql__MinPoolSize = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
